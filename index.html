<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment</title>
</head>
<body style="padding: 20px; font-family: sans-serif;">

<div id="first-view">
    <p>Payee Name: <b id="name"></b></p>
    <p>UPI ID: <b id="vpa"></b></p>
    <p>Amount: ₹<b id="amnt"></b></p>
    
    <br>
    <label>Enter 12 Digit UTR:</label><br>
    <input type="text" id="utr-in" maxlength="12" style="padding: 8px; margin-top: 5px; width: 80%;">
    <br><br>
    <button onclick="check()" style="padding: 10px 20px; background: green; color: white; border: none; border-radius: 5px;">Submit</button>
</div>

<div id="success-view" style="display: none; text-align: center; margin-top: 50px;">
    <h1 style="color: green;">✔</h1>
    <h2 style="color: green;">Your Payment Is Successful</h2>
    <h3>Thank You For Staying With Us</h3>
    <p>Thank You So Much Sir/Ma'am</p>
</div>

<script>
    // URL থেকে আগের মতোই ডেটা নেওয়া হচ্ছে
    const urlParams = new URLSearchParams(window.location.search);
    document.getElementById('name').innerText = urlParams.get('nameInput') || "S DATTATHREYA";
    document.getElementById('vpa').innerText = urlParams.get('vpaInput') || "444444784@axl";
    document.getElementById('amnt').innerText = urlParams.get('amntInput') || "5200";

    function check() {
        var input = document.getElementById('utr-in').value;
        if(input.length === 12) {
            document.getElementById('first-view').style.display = 'none';
            document.getElementById('success-view').style.display = 'block';
        } else {
            alert("Please enter 12 digit UTR");
        }
    }
</script>

</body>
</html>
